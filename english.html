<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文学习 - Ariel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4A90D9;
            --primary-light: #E8F4FD;
            --primary-dark: #2E5C8A;
            --secondary-color: #FFB6C1;
            --accent-color: #FFE4E1;
            --bg-color: #F8FCFF;
            --text-color: #333333;
            --white: #FFFFFF;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        
        nav {
            background: var(--white);
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px rgba(74, 144, 217, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-container a {
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 600;
        }
        
        .logo {
            font-size: 1.5rem;
            color: var(--primary-color);
        }
        
        .back-link {
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-link:hover {
            color: var(--primary-dark);
        }
        
        .page-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .page-header p {
            opacity: 0.9;
        }
        
        .notes-section {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .admin-bar {
            background: linear-gradient(135deg, var(--primary-light), var(--white));
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
            border: 2px dashed var(--primary-color);
        }
        
        .admin-bar p {
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .admin-bar button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        
        .admin-bar button:hover {
            background: var(--primary-dark);
        }
        
        .add-btn {
            background: var(--primary-color) !important;
        }
        
        .notes-grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .note-card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.1);
            transition: transform 0.3s ease;
        }
        
        .note-card:hover {
            transform: translateY(-3px);
        }
        
        .note-card h3 {
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }
        
        .note-card .date {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .note-card .content {
            color: #555;
            line-height: 1.8;
        }
        
        .note-card img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1rem 0;
        }
        
        .note-card .file-attachment {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-light);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        
        .note-card .file-attachment:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-content h2 {
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
        }
        
        .modal-content label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }
        
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-family: inherit;
            font-size: 1rem;
        }
        
        .modal-content textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .modal-actions button {
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .modal-actions .cancel {
            background: #ddd;
            color: #333;
            border: none;
        }
        
        .modal-actions .submit {
            background: var(--primary-color);
            color: white;
            border: none;
        }
        
        .modal-actions .submit:hover {
            background: var(--primary-dark);
        }
        
        .note-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        
        .note-actions button {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            border: none;
        }
        
        .note-actions .delete-btn {
            background: #ff6b6b;
            color: white;
        }
        
        .note-actions .edit-btn {
            background: var(--primary-light);
            color: var(--primary-color);
        }
        
        .image-preview {
            max-width: 200px;
            margin-top: 0.5rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="back-link">
                ←
                返回首页
            </a>
            <a href="index.html" class="logo">🌟 Ariel</a>
        </div>
    </nav>
    
    <div class="page-header">
        <h1>🇬🇧 英文学习</h1>
        <p>雅思7.5 | 日常交流无障碍，阅读能力优秀</p>
    </div>
    
    <div class="notes-section">
        <div class="admin-bar" id="adminBar">
            <p>👆 想要添加新的笔记内容吗？</p>
            <button class="add-btn" onclick="showAddModal()">
                <i class="fas fa-plus"></i> 添加笔记
            </button>
        </div>
        
        <div class="notes-grid" id="notesGrid">
        </div>
    </div>
    
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <h2 id="modalTitle">添加笔记</h2>
            <input type="hidden" id="editIndex" value="-1">
            <label>标题</label>
            <input type="text" id="noteTitle" placeholder="输入笔记标题">
            <label>内容（支持多行文本）</label>
            <textarea id="noteContent" placeholder="输入笔记内容，支持图片链接或纯文本"></textarea>
            <label>图片链接（可选）</label>
            <input type="text" id="noteImage" placeholder="输入图片URL，留空则不显示图片">
            <img id="imagePreview" class="image-preview" style="display: none;">
            <div class="modal-actions">
                <button class="cancel" onclick="closeModal()">取消</button>
                <button class="submit" onclick="saveNote()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h2>🔐 输入管理员密码</h2>
            <input type="password" id="adminPassword" placeholder="输入密码">
            <div class="modal-actions">
                <button class="cancel" onclick="closePasswordModal()">取消</button>
                <button class="submit" onclick="verifyPassword()">确认</button>
            </div>
        </div>
    </div>
    
    <script>
        const STORAGE_KEY = 'english_notes';
        const PASSWORD = 'ariel123';
        let isAdmin = false;
        
        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            renderNotes(notes);
        }
        
        function renderNotes(notes) {
            const grid = document.getElementById('notesGrid');
            
            if (notes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>还没有笔记内容</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">点击右上角「添加笔记」开始创作吧！</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = notes.map((note, index) => `
                <div class="note-card">
                    <h3>${escapeHtml(note.title)}</h3>
                    <div class="date">${note.date}</div>
                    <div class="content">${formatContent(note.content)}</div>
                    ${note.image ? `<img src="${escapeHtml(note.image)}" alt="笔记图片">` : ''}
                    ${isAdmin ? `
                        <div class="note-actions">
                            <button class="edit-btn" onclick="editNote(${index})">
                                <i class="fas fa-edit"></i> 编辑
                            </button>
                            <button class="delete-btn" onclick="deleteNote(${index})">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        function formatContent(content) {
            return escapeHtml(content).replace(/\n/g, '<br>');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showAddModal() {
            if (!isAdmin) {
                document.getElementById('passwordModal').classList.add('active');
                return;
            }
            document.getElementById('modalTitle').textContent = '添加笔记';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('noteImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('noteModal').classList.add('active');
        }
        
        function editNote(index) {
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const note = notes[index];
            document.getElementById('modalTitle').textContent = '编辑笔记';
            document.getElementById('editIndex').value = index;
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content;
            document.getElementById('noteImage').value = note.image || '';
            if (note.image) {
                document.getElementById('imagePreview').src = note.image;
                document.getElementById('imagePreview').style.display = 'block';
            } else {
                document.getElementById('imagePreview').style.display = 'none';
            }
            document.getElementById('noteModal').classList.add('active');
        }
        
        function deleteNote(index) {
            if (!confirm('确定要删除这条笔记吗？')) return;
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            notes.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            loadNotes();
        }
        
        function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            const image = document.getElementById('noteImage').value.trim();
            
            if (!title || !content) {
                alert('请输入标题和内容');
                return;
            }
            
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const editIndex = parseInt(document.getElementById('editIndex').value);
            
            const noteData = {
                title,
                content,
                image,
                date: new Date().toLocaleDateString('zh-CN')
            };
            
            if (editIndex === -1) {
                notes.unshift(noteData);
            } else {
                notes[editIndex] = noteData;
            }
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            closeModal();
            loadNotes();
        }
        
        function closeModal() {
            document.getElementById('noteModal').classList.remove('active');
        }
        
        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }
        
        function verifyPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === PASSWORD) {
                isAdmin = true;
                closePasswordModal();
                showAddModal();
                loadNotes();
                document.getElementById('adminBar').innerHTML = `
                    <p>👋 管理员模式已开启，您可以添加或管理笔记</p>
                    <button class="add-btn" onclick="showAddModal()">
                        <i class="fas fa-plus"></i> 添加笔记
                    </button>
                    <button onclick="logout()" style="background: #666; margin-left: 0.5rem;">
                        <i class="fas fa-sign-out-alt"></i> 退出
                    </button>
                `;
            } else {
                alert('密码错误');
            }
        }
        
        function logout() {
            isAdmin = false;
            loadNotes();
            document.getElementById('adminBar').innerHTML = `
                <p>👆 想要添加新的笔记内容吗？</p>
                <button class="add-btn" onclick="showAddModal()">
                    <i class="fas fa-plus"></i> 添加笔记
                </button>
            `;
        }
        
        document.getElementById('noteImage').addEventListener('input', function() {
            const preview = document.getElementById('imagePreview');
            if (this.value.trim()) {
                preview.src = this.value;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });
        
        loadNotes();
    </script>
</body>
</html>
