<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食分享 - Ariel's Personal Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4A90D9;
            --primary-light: #E8F4FD;
            --primary-dark: #2E5C8A;
            --secondary-color: #FFB6C1;
            --accent-color: #FFE4E1;
            --bg-color: #F8FCFF;
            --text-color: #333333;
            --white: #FFFFFF;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            padding: 2rem 0;
            text-align: center;
            color: var(--white);
        }
        
        .back-link {
            display: inline-block;
            color: var(--white);
            text-decoration: none;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }
        
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .subtitle { font-size: 1.2rem; opacity: 0.9; }
        
        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        
        .section-title {
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .note-card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); }
        
        .note-card img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            margin: 1rem 0;
        }
        
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .note-title { font-size: 1.3rem; color: var(--primary-dark); font-weight: 600; }
        
        .btn-icon {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .btn-edit { background: var(--primary-light); color: var(--primary-color); }
        .btn-delete { background: #FFE4E4; color: #E74C3C; }
        
        .note-content { color: #666; font-size: 0.95rem; margin-bottom: 1rem; }
        .note-date { font-size: 0.85rem; color: #999; }
        
        .add-note-section {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
        }
        
        .add-note-section h3 { color: var(--primary-dark); margin-bottom: 1.5rem; font-size: 1.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-color); font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-color); }
        .form-group textarea { min-height: 120px; resize: vertical; }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--white);
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(74, 144, 217, 0.4); }
        
        .empty-state { text-align: center; padding: 4rem 2rem; color: #999; }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        
        footer { text-align: center; padding: 2rem; color: #999; margin-top: 3rem; }
        
        @media (max-width: 768px) {
            .notes-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1>🍳 美食分享</h1>
        <p class="subtitle">探索美食，记录美味</p>
    </header>
    
    <main>
        <h2 class="section-title">🍽️ 我的美食</h2>
        
        <div class="notes-grid" id="notesGrid"></div>
        
        <div class="add-note-section">
            <h3>➕ 添加美食</h3>
            <form id="noteForm">
                <div class="form-group">
                    <label for="noteTitle">标题</label>
                    <input type="text" id="noteTitle" placeholder="请输入美食名称" required>
                </div>
                <div class="form-group">
                    <label for="noteContent">描述</label>
                    <textarea id="noteContent" placeholder="请输入美食描述"></textarea>
                </div>
                <div class="form-group">
                    <label for="noteImage">图片URL（可选）</label>
                    <input type="text" id="noteImage" placeholder="请输入图片URL">
                </div>
                <button type="submit" class="btn-primary">保存美食</button>
            </form>
        </div>
    </main>
    
    <footer>© 2024 Ariel. All rights reserved.</footer>
    
    <script>
        const STORAGE_KEY = 'food_notes';
        
        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            renderNotes(notes);
        }
        
        function renderNotes(notes) {
            const grid = document.getElementById('notesGrid');
            if (notes.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="fas fa-utensils"></i><p>暂无美食，点击下方添加第一道美食吧！</p></div>';
                return;
            }
            grid.innerHTML = notes.map((note, index) => `
                <div class="note-card">
                    ${note.image ? '<img src="' + note.image + '" alt="' + note.title + '" onerror="this.style.display=\'none\';">' : ''}
                    <div class="note-header"><h3 class="note-title">${note.title}</h3>
                    <div><button class="btn-icon btn-edit" onclick="editNote(${index})">编辑</button>
                    <button class="btn-icon btn-delete" onclick="deleteNote(${index})">删除</button></div></div>
                    ${note.content ? '<p class="note-content">' + note.content + '</p>' : ''}
                    <span class="note-date">${note.date}</span>
                </div>
            `).join('');
        }
        
        function saveNotes(notes) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            renderNotes(notes);
        }
        
        document.getElementById('noteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            const image = document.getElementById('noteImage').value.trim();
            
            if (!title) { alert('请填写标题'); return; }
            
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            notes.unshift({ title, content, image, date: new Date().toLocaleDateString('zh-CN') });
            saveNotes(notes);
            this.reset();
            alert('美食保存成功！');
        });
        
        function editNote(index) {
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const note = notes[index];
            const newTitle = prompt('修改标题：', note.title);
            if (newTitle === null) return;
            const newContent = prompt('修改描述：', note.content);
            if (newContent === null) return;
            notes[index] = { title: newTitle.trim() || note.title, content: newContent.trim() || note.content, image: note.image, date: note.date };
            saveNotes(notes);
            alert('美食修改成功！');
        }
        
        function deleteNote(index) {
            if (!confirm('确定要删除这道美食吗？')) return;
            const notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            notes.splice(index, 1);
            saveNotes(notes);
            alert('美食已删除！');
        }
        
        loadNotes();
    </script>
</body>
</html>
